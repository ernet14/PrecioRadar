name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint & Unit (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/precioradar"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/precioradar"
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      CRON_SECRET: "ci-placeholder-secret"
      AUDIT_IP_HASH_SALT: "ci-placeholder-salt"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Cache Prisma generated client
        uses: actions/cache@v4
        with:
          path: |
            src/generated/prisma
            node_modules/.prisma
          key: prisma-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('prisma/schema.prisma') }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  build-e2e:
    name: Build & E2E (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-test

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/precioradar"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/precioradar"
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      CRON_SECRET: "ci-placeholder-secret"
      AUDIT_IP_HASH_SALT: "ci-placeholder-salt"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Cache Prisma generated client
        uses: actions/cache@v4
        with:
          path: |
            src/generated/prisma
            node_modules/.prisma
          key: prisma-${{ runner.os }}-node22-${{ hashFiles('prisma/schema.prisma') }}

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json', 'prisma/schema.prisma') }}-${{ hashFiles('src/**/*.[jt]sx?', 'src/**/*.css') }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('package-lock.json', 'prisma/schema.prisma') }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        env:
          SENTRY_DSN: ""
          NEXT_PUBLIC_SENTRY_DSN: ""
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
